<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가상 물리 실험실 — 코딩더메이커</title>
<style>
  :root {
    --bg: #0a0e17; --panel: #121826; --panel2: #1a2234; --border: #263046;
    --text: #e8eef7; --dim: #8b98ad; --accent: #4da3ff; --green: #2ee06f; --amber: #ffb02e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background:
      radial-gradient(1100px 500px at 80% -10%, #14203a 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #101a30 0%, transparent 55%),
      var(--bg);
    color: var(--text); font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    padding: 28px 16px; min-height: 100vh;
  }
  .wrap { max-width: 1060px; margin: 0 auto; }
  header { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .logo { width: 44px; height: 44px; border-radius: 11px; background: linear-gradient(135deg, #1f5eff, #4da3ff); display: flex; align-items: center; justify-content: center; font-size: 23px; box-shadow: 0 4px 18px rgba(45,120,255,.35); }
  header h1 { font-size: 23px; letter-spacing: -0.5px; }
  header .sub { color: var(--dim); font-size: 13px; margin-top: 3px; }
  .intro { background: linear-gradient(90deg, rgba(77,163,255,.10), rgba(77,163,255,.02)); border: 1px solid rgba(77,163,255,.25); border-radius: 12px; padding: 12px 16px; font-size: 13.5px; color: #cfdcef; margin: 16px 0 28px; line-height: 1.6; }
  .course { margin-bottom: 34px; }
  .course-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .course-head h2 { font-size: 17px; }
  .course-head .cnt { font-size: 12px; color: var(--dim); }
  .sims { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  a.sim { display: block; text-decoration: none; color: inherit; background: linear-gradient(180deg, #131a2b, #101626); border: 1px solid var(--border); border-radius: 14px; padding: 18px; transition: transform .12s, border-color .15s, box-shadow .15s; box-shadow: 0 8px 24px rgba(0,0,0,.28); }
  a.sim:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 14px 34px rgba(30,90,200,.25); }
  .sim .top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .sim .icon { width: 42px; height: 42px; border-radius: 10px; background: var(--panel2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .sim h3 { font-size: 15.5px; }
  .sim .lesson { font-size: 11.5px; color: var(--dim); margin-top: 2px; }
  .sim p { font-size: 12.5px; color: #a9b6cb; line-height: 1.6; }
  .sim .foot { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
  .pill { font-size: 11px; border-radius: 20px; padding: 3px 10px; border: 1px solid; }
  .pill.on { color: var(--green); border-color: rgba(46,224,111,.45); background: rgba(46,224,111,.08); }
  .pill.tool { color: var(--dim); border-color: var(--border); }
  .go { margin-left: auto; color: var(--accent); font-size: 13px; font-weight: 700; }
  .sim.soon { opacity: .55; pointer-events: none; }
  .pill.soon { color: var(--amber); border-color: rgba(255,176,46,.4); background: rgba(255,176,46,.07); }
  footer { color: #55617a; font-size: 11.5px; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🔬</div>
    <div>
      <h1>가상 물리 실험실</h1>
      <div class="sub">코딩더메이커 · 수업 시뮬레이터 모음 — 예측하고, 레고로 실험하고, 비교한다</div>
    </div>
  </header>
  <div class="intro">
    수업에서 하는 실제 레고 실험을 컴퓨터 안에서 미리 해볼 수 있는 곳이야.
    <b>시뮬레이터로 예측 → 레고로 진짜 실험 → 두 결과 비교</b> — 이게 과학자의 방법!
    시뮬레이터는 계속 추가된다.
  </div>

  <div id="courses"></div>

  <footer>코딩더메이커 가상 물리 실험실 · 시뮬레이터는 수업 진도에 맞춰 계속 추가됩니다</footer>
</div>

<script>
'use strict';
/* ── 시뮬레이터 레지스트리 — 새 시뮬은 여기에 한 줄 추가 + 폴더 생성 ── */
const COURSES = [
  {
    name: '🧱 브릭 프라임 과정',
    sims: [
      {
        id: 'ski-slope', icon: '⛷️', title: '스키 슬로프 시뮬레이션',
        lesson: '경사면과 마찰 · 갈릴레이 낙하',
        desc: '질량이 다른 두 스키어가 같은 슬로프를 내려온다 — 무거운 쪽이 더 멀리 갈까? 깃털과 쇠공 낙하까지, "질량은 결과를 바꾸지 못한다"를 눈으로 확인한다.',
        tags: ['3D · 카메라 회전', '공기저항 토글', '슬로모션'],
        ready: true,
      },
      {
        id: 'gear-ratio', icon: '⚙️', title: '기어비 시뮬레이션',
        lesson: '기어와 회전 속도',
        desc: '드라이버·팔로워 기어 잇수를 바꾸면 속도와 힘이 어떻게 변할까? 아이들러 기어를 끼우면? — 속도와 힘의 맞바꿈을 눈으로 확인한다.',
        tags: ['8·16·24·40T', '아이들러 실험', '회전수 그래프'],
        ready: true,
      },
    ],
  },
  {
    name: '🤖 로봇 센서 과정',
    sims: [
      { icon: '📡', title: '초음파 정지거리 시뮬레이션', lesson: '센서와 제어', desc: '로봇 속도와 감지 거리에 따라 벽 앞에 안전하게 멈출 수 있을까?', ready: false },
    ],
  },
];

const root = document.getElementById('courses');
COURSES.forEach(course => {
  const readyCnt = course.sims.filter(s => s.ready).length;
  const sec = document.createElement('section');
  sec.className = 'course';
  sec.innerHTML = `<div class="course-head"><h2>${course.name}</h2><span class="cnt">시뮬레이터 ${readyCnt}개 가동 중</span></div>`;
  const grid = document.createElement('div');
  grid.className = 'sims';
  course.sims.forEach(s => {
    const a = document.createElement('a');
    a.className = 'sim' + (s.ready ? '' : ' soon');
    a.href = s.ready ? s.id + '/' : '#';
    a.innerHTML = `
      <div class="top">
        <div class="icon">${s.icon}</div>
        <div><h3>${s.title}</h3><div class="lesson">${s.lesson}</div></div>
      </div>
      <p>${s.desc}</p>
      <div class="foot">
        ${s.ready
          ? `<span class="pill on">● 가동 중</span>` + (s.tags || []).map(t => `<span class="pill tool">${t}</span>`).join('')
          : `<span class="pill soon">준비 중</span>`}
        ${s.ready ? '<span class="go">실험하러 가기 →</span>' : ''}
      </div>`;
    grid.appendChild(a);
  });
  sec.appendChild(grid);
  root.appendChild(sec);
});
</script>
</body>
</html>
